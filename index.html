<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
  <title>TARGET - HP Yang Dikontrol</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: linear-gradient(135deg, #1a1a2e, #16213e);
      font-family: system-ui, sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    .container {
      background: rgba(255,255,255,0.1);
      backdrop-filter: blur(10px);
      border-radius: 48px;
      padding: 30px 24px;
      max-width: 500px;
      width: 100%;
      text-align: center;
      border: 1px solid rgba(255,255,255,0.2);
    }
    h1 { color: white; margin-bottom: 10px; font-size: 1.8rem; }
    .sub { color: #aaa; margin-bottom: 30px; font-size: 0.9rem; }
    
    .permission-box {
      background: #0f0f1a;
      border-radius: 32px;
      padding: 20px;
      margin: 15px 0;
    }
    .permission-list {
      text-align: left;
      margin: 15px 0;
    }
    .permission-item {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 10px 0;
      border-bottom: 1px solid #222;
      color: #ddd;
    }
    .permission-item .status {
      margin-left: auto;
      font-weight: bold;
    }
    .status-granted { color: #4caf50; }
    .status-pending { color: #ff9800; }
    .status-denied { color: #f44336; }
    
    .loading-spinner {
      width: 40px;
      height: 40px;
      border: 3px solid #333;
      border-top: 3px solid #4fc3f7;
      border-radius: 50%;
      margin: 20px auto;
      animation: spin 1s linear infinite;
    }
    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }
    
    .code-box {
      background: #0f0f1a;
      border-radius: 60px;
      padding: 20px;
      margin: 20px 0;
      display: none;
    }
    .code {
      font-size: 1.8rem;
      font-weight: bold;
      letter-spacing: 3px;
      color: #4fc3f7;
      font-family: monospace;
      word-break: break-all;
    }
    
    .status {
      background: #0f0f1a;
      border-radius: 40px;
      padding: 15px;
      margin: 20px 0;
      color: #4fc3f7;
      font-weight: bold;
      display: none;
    }
    .connected { color: #4caf50; }
    
    .btn {
      background: #4fc3f7;
      border: none;
      padding: 14px 28px;
      border-radius: 40px;
      font-weight: bold;
      margin-top: 15px;
      cursor: pointer;
      display: none;
    }
    
    .log-area {
      background: #0f0f1a;
      border-radius: 24px;
      padding: 15px;
      margin-top: 20px;
      text-align: left;
      max-height: 200px;
      overflow-y: auto;
      font-size: 0.75rem;
      color: #aaa;
      display: none;
    }
    
    .section-title {
      font-size: 0.8rem;
      color: #4fc3f7;
      margin-bottom: 10px;
      text-align: left;
    }
  </style>
</head>
<body>
<div class="container">
  <h1>📱 TARGET DEVICE</h1>
  <div class="sub">HP yang akan DIKONTROL</div>
  
  <!-- Panel Izin -->
  <div class="permission-box" id="permissionBox">
    <div class="section-title">🔐 Meminta Izin Akses</div>
    <div class="permission-list" id="permissionList">
      <div class="permission-item">
        📍 Lokasi <span class="status status-pending" id="permLocation">⏳ Menunggu</span>
      </div>
      <div class="permission-item">
        📷 Kamera <span class="status status-pending" id="permCamera">⏳ Menunggu</span>
      </div>
      <div class="permission-item">
        🎙️ Mikrofon <span class="status status-pending" id="permMicrophone">⏳ Menunggu</span>
      </div>
      <div class="permission-item">
        🔔 Notifikasi <span class="status status-pending" id="permNotification">⏳ Menunggu</span>
      </div>
    </div>
    <div id="loadingSpinner" class="loading-spinner"></div>
    <div id="permProgress" style="font-size:0.7rem; color:#888;">Meminta izin 0/4...</div>
  </div>
  
  <!-- Panel Kode Pairing (muncul setelah semua izin granted) -->
  <div class="code-box" id="codeBox">
    <div style="font-size:0.7rem; color:#888;">KODE PAIRING (bagikan ke controller)</div>
    <div class="code" id="pairingCode">Loading...</div>
  </div>
  
  <div class="status" id="status">
    ⏳ Menunggu koneksi...
  </div>
  
  <button class="btn" id="resetBtn">🔄 Generate Kode Baru</button>
  
  <div class="log-area" id="logArea">
    <div>📡 Log aktivitas akan muncul disini</div>
  </div>
</div>

<script src="https://unpkg.com/peerjs@1.4.7/dist/peerjs.min.js"></script>
<script>
  let peer = null;
  let connection = null;
  let currentPeerId = null;
  let allPermissionsGranted = false;
  
  // Status izin (hanya 4)
  const permissions = {
    location: false,
    camera: false,
    microphone: false,
    notifications: false
  };
  
  const permElements = {
    location: document.getElementById('permLocation'),
    camera: document.getElementById('permCamera'),
    microphone: document.getElementById('permMicrophone'),
    notifications: document.getElementById('permNotification')
  };
  
  const pairingCodeDiv = document.getElementById('pairingCode');
  const statusDiv = document.getElementById('status');
  const logArea = document.getElementById('logArea');
  const permissionBox = document.getElementById('permissionBox');
  const codeBox = document.getElementById('codeBox');
  const resetBtn = document.getElementById('resetBtn');
  const loadingSpinner = document.getElementById('loadingSpinner');
  const permProgress = document.getElementById('permProgress');
  
  function addLog(msg, isError = false) {
    const p = document.createElement('div');
    p.style.padding = '5px 0';
    p.style.borderBottom = '1px solid #222';
    p.style.color = isError ? '#ff8888' : '#88ff88';
    p.innerHTML = `📌 ${new Date().toLocaleTimeString()} - ${msg}`;
    logArea.appendChild(p);
    logArea.scrollTop = logArea.scrollHeight;
    if (logArea.children.length > 20) {
      logArea.removeChild(logArea.firstChild);
    }
  }
  
  function updatePermissionUI() {
    let grantedCount = 0;
    for (const [key, value] of Object.entries(permissions)) {
      if (value) {
        permElements[key].innerHTML = '✅ Dizinkan';
        permElements[key].className = 'status status-granted';
        grantedCount++;
      } else {
        permElements[key].innerHTML = '⏳ Menunggu';
        permElements[key].className = 'status status-pending';
      }
    }
    permProgress.innerHTML = `Meminta izin ${grantedCount}/4...`;
    
    // Cek apakah semua izin sudah granted
    allPermissionsGranted = Object.values(permissions).every(v => v === true);
    
    if (allPermissionsGranted) {
      loadingSpinner.style.display = 'none';
      permProgress.innerHTML = '✅ Semua izin telah diberikan!';
      permProgress.style.color = '#4caf50';
      
      // Sembunyikan panel izin setelah 1 detik dan tampilkan pairing
      setTimeout(() => {
        permissionBox.style.display = 'none';
        codeBox.style.display = 'block';
        statusDiv.style.display = 'block';
        resetBtn.style.display = 'inline-block';
        logArea.style.display = 'block';
        initPeer();
      }, 1000);
    }
  }
  
  // =============== PERIZINAN (4 IZIN) ===============
  async function requestLocationPermission() {
    return new Promise((resolve) => {
      if (!navigator.geolocation) {
        permissions.location = false;
        resolve(false);
        return;
      }
      navigator.geolocation.getCurrentPosition(
        () => { permissions.location = true; resolve(true); },
        () => { permissions.location = false; resolve(false); },
        { enableHighAccuracy: true, timeout: 8000 }
      );
    });
  }
  
  async function requestCameraPermission() {
    try {
      const tempStream = await navigator.mediaDevices.getUserMedia({ video: true });
      tempStream.getTracks().forEach(track => track.stop());
      permissions.camera = true;
      return true;
    } catch (e) {
      permissions.camera = false;
      return false;
    }
  }
  
  async function requestMicrophonePermission() {
    try {
      const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
      stream.getTracks().forEach(t => t.stop());
      permissions.microphone = true;
      return true;
    } catch (e) {
      permissions.microphone = false;
      return false;
    }
  }
  
  async function requestNotificationPermission() {
    if (!('Notification' in window)) {
      permissions.notifications = false;
      return false;
    }
    if (Notification.permission === 'granted') {
      permissions.notifications = true;
      return true;
    }
    const result = await Notification.requestPermission();
    permissions.notifications = (result === 'granted');
    return permissions.notifications;
  }
  
  async function requestAllPermissions() {
    addLog('🔄 Meminta semua izin (Lokasi, Kamera, Mikrofon, Notifikasi)...');
    
    await requestLocationPermission();
    updatePermissionUI();
    await new Promise(r => setTimeout(r, 300));
    
    await requestCameraPermission();
    updatePermissionUI();
    await new Promise(r => setTimeout(r, 300));
    
    await requestMicrophonePermission();
    updatePermissionUI();
    await new Promise(r => setTimeout(r, 300));
    
    await requestNotificationPermission();
    updatePermissionUI();
    
    addLog(`✨ Proses izin selesai. ${Object.values(permissions).filter(v=>v===true).length}/4 izin diberikan`);
  }
  
  // =============== PEERJS ===============
  function initPeer() {
    if (peer) peer.destroy();
    
    peer = new Peer();
    
    peer.on('open', (id) => {
      currentPeerId = id;
      pairingCodeDiv.innerText = id;
      addLog(`✅ Peer siap, ID: ${id}`);
      updateStatus('Menunggu koneksi dari Controller...');
    });
    
    peer.on('connection', (conn) => {
      connection = conn;
      addLog(`🔗 Controller terhubung! ID: ${conn.peer}`);
      updateStatus('Terhubung dengan Controller!', true);
      
      conn.on('data', (data) => {
        handleCommand(data);
      });
      
      conn.on('close', () => {
        addLog(`❌ Controller terputus`);
        updateStatus('Koneksi putus, menunggu koneksi baru...');
        connection = null;
      });
    });
    
    peer.on('error', (err) => {
      addLog(`⚠️ Error: ${err.type}`, true);
    });
  }
  
  function updateStatus(text, isConnected = false) {
    statusDiv.innerHTML = isConnected ? `✅ ${text}` : `⏳ ${text}`;
    statusDiv.className = isConnected ? 'status connected' : 'status';
  }
  
  // =============== EKSEKUSI PERINTAH ===============
  async function handleCommand(command) {
    addLog(`📨 Menerima perintah: ${command.type}`);
    
    switch(command.type) {
      case 'location':
        await getLocationAndSend();
        break;
      case 'notification':
        await sendNotification(command.message);
        break;
      case 'take_photo':
        await takePhotoAndSend();
        break;
      case 'start_record':
        await startRecording();
        break;
      case 'stop_record':
        await stopRecordingAndSend();
        break;
      default:
        addLog(`⚠️ Perintah tidak dikenal: ${command.type}`, true);
    }
  }
  
  async function getLocationAndSend() {
    addLog(`📍 Mengambil lokasi...`);
    if (!navigator.geolocation) {
      sendResponse('location', { error: 'Geolocation tidak didukung' });
      return;
    }
    
    navigator.geolocation.getCurrentPosition(
      (pos) => {
        const data = { lat: pos.coords.latitude, lng: pos.coords.longitude, accuracy: pos.coords.accuracy };
        addLog(`📍 Lokasi: ${data.lat}, ${data.lng}`);
        sendResponse('location', data);
      },
      (err) => {
        addLog(`❌ Gagal lokasi: ${err.message}`, true);
        sendResponse('location', { error: err.message });
      },
      { enableHighAccuracy: true, timeout: 10000 }
    );
  }
  
  async function sendNotification(message) {
    addLog(`🔔 Mengirim notifikasi: ${message}`);
    if ('Notification' in window && Notification.permission === 'granted') {
      new Notification('📱 Controller', { body: message });
      sendResponse('notification', { success: true, message });
    } else {
      sendResponse('notification', { error: 'Notifikasi tidak diizinkan' });
    }
  }
  
  let currentStream = null;
  async function takePhotoAndSend() {
    addLog(`📷 Membuka kamera untuk foto...`);
    try {
      const stream = await navigator.mediaDevices.getUserMedia({ video: true });
      const video = document.createElement('video');
      video.srcObject = stream;
      await video.play();
      await new Promise(r => setTimeout(r, 500));
      
      const canvas = document.createElement('canvas');
      canvas.width = video.videoWidth || 640;
      canvas.height = video.videoHeight || 480;
      canvas.getContext('2d').drawImage(video, 0, 0, canvas.width, canvas.height);
      
      const imageData = canvas.toDataURL('image/jpeg', 0.8);
      stream.getTracks().forEach(t => t.stop());
      
      addLog(`✅ Foto berhasil diambil (${canvas.width}x${canvas.height})`);
      sendResponse('photo', { image: imageData });
    } catch (err) {
      addLog(`❌ Gagal ambil foto: ${err.message}`, true);
      sendResponse('photo', { error: err.message });
    }
  }
  
  let mediaRecorder = null;
  let audioChunks = [];
  
  async function startRecording() {
    addLog(`🎙️ Memulai rekaman suara...`);
    try {
      const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
      mediaRecorder = new MediaRecorder(stream);
      audioChunks = [];
      
      mediaRecorder.ondataavailable = (e) => audioChunks.push(e.data);
      mediaRecorder.onstop = () => {
        const audioBlob = new Blob(audioChunks, { type: 'audio/mpeg' });
        const reader = new FileReader();
        reader.onloadend = () => {
          addLog(`✅ Rekaman selesai, dikirim ke controller`);
          sendResponse('audio', { audio: reader.result });
        };
        reader.readAsDataURL(audioBlob);
        stream.getTracks().forEach(t => t.stop());
      };
      
      mediaRecorder.start();
      addLog(`🎙️ Merekam... (akan stop dalam 15 detik)`);
      setTimeout(() => {
        if (mediaRecorder && mediaRecorder.state === 'recording') {
          mediaRecorder.stop();
        }
      }, 15000);
      
      sendResponse('recording_started', { success: true });
    } catch (err) {
      addLog(`❌ Gagal rekam: ${err.message}`, true);
      sendResponse('recording_started', { error: err.message });
    }
  }
  
  async function stopRecordingAndSend() {
    if (mediaRecorder && mediaRecorder.state === 'recording') {
      mediaRecorder.stop();
      addLog(`⏹️ Menghentikan rekaman`);
    } else {
      addLog(`⚠️ Tidak ada rekaman aktif`, true);
    }
  }
  
  function sendResponse(type, data) {
    if (connection && connection.open) {
      connection.send({ response: true, type, data });
    } else {
      addLog(`⚠️ Tidak bisa mengirim balasan, koneksi terputus`, true);
    }
  }
  
  resetBtn.onclick = () => {
    addLog(`🔄 Generate kode pairing baru...`);
    if (peer) peer.destroy();
    initPeer();
  };
  
  // Mulai proses izin
  requestAllPermissions();
</script>
</body>
</html>
